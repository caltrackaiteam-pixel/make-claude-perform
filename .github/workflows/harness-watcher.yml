name: Harness Watcher — Monitor upstream Claude Code frameworks

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no PR created)'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  check-upstreams:
    name: Check upstream frameworks for updates
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Read pinned versions
        id: pinned
        run: |
          echo "sources=$(cat .mcp-sources.json)" >> $GITHUB_OUTPUT
      
      - name: Query GitHub API for latest versions
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/check-upstreams.js
        
      - name: Compare versions and generate diff summary
        id: diff
        run: |
          node scripts/generate-update-report.js
      
      - name: Create update PR if changes detected
        if: steps.diff.outputs.has_updates == 'true' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "mcp-harness-watcher[bot]"
          git config user.email "noreply@github.com"
          
          BRANCH="auto-update/$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          
          # Update .mcp-sources.json with new pinned SHAs
          node scripts/pin-new-versions.js
          
          git add .mcp-sources.json
          git commit -m "chore: pin upstream updates $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          
          # Create PR with full diff report
          gh pr create \
            --title "Upstream update available — $(date +%Y-%m-%d)" \
            --body "$(cat .mcp-update-report.md)" \
            --label "upstream-update" \
            --label "needs-review" \
            --base main \
            --head "$BRANCH"
      
      - name: Upload update report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-report-${{ github.run_number }}
          path: .mcp-update-report.md
          if-no-files-found: ignore
