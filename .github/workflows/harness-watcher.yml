name: Harness Watcher - Auto-update Make Claude Perform

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run - report only, no PR'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    name: Check upstreams and auto-update safe changes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '20'

      - name: Query GitHub API for latest versions and star counts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/check-upstreams.js

      - name: Generate update report and classify changes
        id: diff
        run: node scripts/generate-update-report.js

      - name: Auto-update safe changes and open PR
        if: steps.diff.outputs.has_updates == 'true' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "mcp-harness-watcher[bot]"
          git config user.email "noreply@github.com"

          BRANCH="auto-update/$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"

          # Pin new versions - always safe
          node scripts/pin-new-versions.js
          git add .mcp-sources.json

          # Update CLAUDE.md header with latest star counts
          node scripts/update-star-counts.js
          git add CLAUDE.md

          git commit -m "chore: auto-update upstream pins and star counts $(date +%Y-%m-%d)" || echo "Nothing to commit"

          git push origin "$BRANCH"

          DEFAULT_BRANCH=$(git remote show origin | grep 'HEAD branch' | awk '{print $NF}')

          gh pr create \
            --title "Upstream update $(date +%Y-%m-%d)" \
            --body "$(cat .mcp-update-report.md)" \
            --label "upstream-update" \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH"

      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: always()
        with:
          name: update-report-${{ github.run_number }}
          path: .mcp-update-report.md
          if-no-files-found: ignore